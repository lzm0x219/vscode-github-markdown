name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 3 * * 1"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4

      - uses: nubjs/setup-nub@v0

      - run: pnpm install --frozen-lockfile

      - name: Cache Chromium
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint
        run: nubx oxlint .

      - name: Format check
        run: nubx oxfmt --check .

      - name: Lint (type-aware)
        run: nubx oxlint --type-aware .

      - name: Test
        run: nub run test

      - name: Verify Markdown parity baseline
        run: pnpm run verify:parity

      - name: Detect GitHub Markdown renderer drift
        if: github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: pnpm run verify:parity:remote

      - name: Upload Markdown parity images
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: markdown-parity-${{ github.run_id }}
          path: artifacts/parity
          if-no-files-found: ignore

      - name: Build
        run: nub run build
