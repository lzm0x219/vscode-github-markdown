name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v3

      - uses: nubjs/setup-nub@v0

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: nubx oxlint .

      - name: Format check
        run: nubx oxfmt --check .

      - name: Lint (type-aware)
        run: nubx oxlint --type-aware .

      - name: Test
        run: nub run test

      - name: Build
        run: nub run build
