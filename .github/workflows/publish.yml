name: Publish

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  discussions: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: nubjs/setup-nub@v0

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: nubx oxlint .

      - name: Format check
        run: nubx oxfmt --check .

      - name: Type-aware lint
        run: nubx oxlint --type-aware .

      - name: Test
        run: nub run test

      - name: Build
        run: nub run build

      - name: Package
        run: nub run package

      - name: Login to Azure with Microsoft Entra ID
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify publisher access
        run: nubx vsce verify-pat lzm0x219 --azure-credential

      - name: Publish to VS Code Marketplace
        if: success()
        run: nubx vsce publish --azure-credential

      - name: Generate Changelog
        run: nub run release:note

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v3
        with:
          files: "*.vsix"
          body_path: ${{ github.workspace }}-CHANGELOG.txt
          repository: lzm0x219/vscode-github-markdown
          token: ${{ secrets.CUSTOM_GITHUB_TOKEN }}
