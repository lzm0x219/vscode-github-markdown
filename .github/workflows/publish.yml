name: Publish

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v7

      - name: Verify release version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          tag_version="${GITHUB_REF_NAME#v}"

          if [[ "$GITHUB_REF_NAME" != "v$package_version" ]]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package version $package_version"
            exit 1
          fi

          if [[ ! "$tag_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag $GITHUB_REF_NAME is not a stable semantic version"
            exit 1
          fi

      - uses: jdx/mise-action@v4

      - uses: nubjs/setup-nub@v0

      - run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high

      - name: Cache Chromium
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Lint
        run: nubx oxlint .

      - name: Format check
        run: nubx oxfmt --check .

      - name: Type-aware lint
        run: nubx oxlint --type-aware .

      - name: Test
        run: nub run test

      - name: Verify Markdown parity baseline
        run: pnpm run verify:parity

      - name: Build
        run: nub run build

      - name: Package
        run: nub run package

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vscode-github-markdown-${{ github.ref_name }}
          path: "*.vsix"
          if-no-files-found: error
          retention-days: 14

  publish:
    needs: verify
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v7

      - uses: jdx/mise-action@v4

      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          name: vscode-github-markdown-${{ github.ref_name }}
          path: release

      - name: Login to Azure with Microsoft Entra ID
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify publisher access
        run: pnpm exec vsce verify-pat lzm0x219 --azure-credential

      - name: Publish to VS Code Marketplace
        run: pnpm exec vsce publish --packagePath release/*.vsix --azure-credential --skip-duplicate

  finalize:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: vscode-github-markdown-${{ github.ref_name }}
          path: release

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "$GITHUB_REF_NAME" release/*.vsix --clobber
          gh release edit "$GITHUB_REF_NAME" --draft=false
